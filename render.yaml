databases:
  - name: lms-db
    plan: free # Change to 'starter' for production
    ipAllowList: [] # Allows all traffic; Render manages internal communication

services:
  # 1. Whisper AI Transcription Service (Dockerized)
  - type: web
    name: whisper-api
    plan: starter # Whisper requires at least 1GB RAM to process models reliably
    env: docker
    dockerContext: whisper-service
    dockerfilePath: Dockerfile
    # Internal port for uvicorn is 10000 by default in Render
    envVars:
      - key: WHISPER_MODEL_SIZE
        value: base

  # 2. Next.js Main Application
  - type: web
    name: lms-app
    plan: free
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: AUTH_SECRET # required for NextAuth v5
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: true
      - key: WHISPER_LAMBDA_URL
        value: http://whisper-api:10000/transcribe
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: lms-app
          property: host
